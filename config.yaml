# ── OpenFOAM Post-Processing Config ──
# Copy this file into your case directory and adjust paths/labels.
# Run:  python run.py --config config.yaml

report:
  title: "CFD Post-Processing Report"
  author: "Your Name"
  case_name: "My OpenFOAM Case"
  description: "A Description"
  expert_mode: true

plots:
  - type: residuals
    file: postProcessing/residuals/0/residuals.dat
    section: Residuals

  - type: yplus
    file: postProcessing/yPlus/0/yPlus.dat
    section: "Wall Y+"

  - type: sidepod_pressure
    file: postProcessing/probes/0/p
    section: "Probe Pressure"
    ylabel: "Pressure [Pa]"
    title: "Probe Pressure vs Time"

  - type: sidepod_massflow
    file: postProcessing/sidepodMassFlowR/0/surfaceFieldValue.dat
    section: "Mass Flow"
    ylabel: "Mass-flow rate [kg/s]"
    title: "Mass-flow rate vs Time"

  - type: image
    file: postProcessing/images/foam_render.png
    caption: "Pressure & Streamlines"
    section: "Flow Visualisation"
  
  - type: Cd
    file: postProcessing/forceCoeffs/0/forceCoeffs.dat
    section: "Aerodynamic Coefficients"

  - type: Cl
    file: postProcessing/forceCoeffs/0/forceCoeffs.dat
    section: "Aerodynamic Coefficients"